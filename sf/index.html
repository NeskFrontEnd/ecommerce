<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SupaFast Fitess</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>

  <!-- App root -->
  <div id="app">

    <!-- Screen container — screens render here -->
    <main id="screen" class="screen-container" role="main" aria-live="polite"></main>

    <!-- Bottom navigation -->
    <nav id="bottom-nav" class="bottom-nav" aria-label="Головна навігація"></nav>

    <!-- Toast notifications -->
    <div id="toasts" class="toast-container" aria-live="assertive" aria-atomic="true"></div>

  </div>

  <!-- Loading splash -->
  <div id="splash" class="splash">
    <span class="splash-logo">SF</span>
    <span class="splash-sub mono">SupaFast Fitess</span>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
